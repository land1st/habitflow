<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#FF6B35"/>
  <meta name="description" content="매일 습관을 추적하고 성장하세요"/>
  <meta property="og:title" content="HabitFlow"/>
  <meta property="og:description" content="매일 습관을 추적하고 성장하세요"/>
  <meta property="og:type" content="website"/>
  <title>HabitFlow</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon-lg"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M6 18C6 11.373 11.373 6 18 6s12 5.373 12 12-5.373 12-12 12S6 24.627 6 18z" fill="#FF6B35" opacity=".2"/><path d="M13 18l3.5 3.5L23 13" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h1>HabitFlow</h1>
      <p>매일 습관을 추적하고 성장하세요</p>
    </div>
    <div class="login-features">
      <div class="feat"><span class="feat-icon">☁️</span><span>Google Drive에 자동 백업</span></div>
      <div class="feat"><span class="feat-icon">📊</span><span>스트릭 & 통계 추적</span></div>
      <div class="feat"><span class="feat-icon">🔄</span><span>기기 간 동기화</span></div>
    </div>
    <button class="google-btn" id="btn-google-login">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 시작하기
    </button>
    <button class="local-btn" id="btn-local-login">로그인 없이 시작하기</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="screen-app" class="screen">

  <!-- Header -->
  <header class="app-header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon-sm"><svg width="18" height="18" viewBox="0 0 36 36" fill="none"><path d="M13 18l3.5 3.5L23 13" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="logo-text">Habit<b>Flow</b></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-sync" title="동기화" aria-label="동기화">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="icon-btn" id="btn-menu" title="메뉴" aria-label="메뉴">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </div>
    <div class="greeting">
      <h2 id="greeting-text">좋은 아침이에요! 👋</h2>
      <p id="today-label"></p>
    </div>
    <div class="week-strip" id="week-strip"></div>
  </header>

  <!-- Progress Banner -->
  <div class="progress-banner" id="progress-banner">
    <div class="prog-left">
      <div class="prog-title">오늘도 가볍게 시작해요</div>
      <div class="prog-sub" id="prog-sub">3개만 더 하면 완료예요</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-bar-fill"></div></div>
    </div>
    <div class="prog-ring-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="24" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width="5"/>
        <circle id="prog-ring-arc" cx="30" cy="30" r="24" fill="none" stroke="white" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="150.8"
          transform="rotate(-90 30 30)" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/>
      </svg>
      <div class="prog-ring-label" id="prog-ring-label">0/0</div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">🔥 현재 스트릭</div><div class="stat-val" id="stat-streak">0<span>일</span></div></div>
    <div class="stat-card"><div class="stat-label">⭐ 최장 스트릭</div><div class="stat-val" id="stat-best">0<span>일</span></div></div>
    <div class="stat-card"><div class="stat-label">✅ 이번 주</div><div class="stat-val" id="stat-week">0<span>%</span></div></div>
  </div>

  <!-- Habit List -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">오늘의 습관</span>
      <span class="section-badge" id="done-badge">0/0 완료</span>
    </div>
    <div id="habit-list" class="habit-list"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon">🌱</div>
      <p>아직 습관이 없어요</p>
      <small>+ 버튼으로 첫 습관을 추가해보세요</small>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="btn-add-habit" aria-label="습관 추가">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div><!-- /screen-app -->

<!-- ── MODALS ── -->

<!-- Habit Modal (Add / Edit) -->
<div id="modal-habit" class="modal-overlay" role="dialog" aria-modal="true" aria-label="습관 편집">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 id="modal-habit-title">새 습관 추가</h3>
    <div class="icon-picker" id="icon-picker"></div>
    <div class="color-picker" id="color-picker"></div>
    <label class="field-label">습관 이름 *</label>
    <input id="hab-name" type="text" placeholder="예: 독서" maxlength="20" autocomplete="off"/>
    <label class="field-label">세부 목표</label>
    <input id="hab-sub" type="text" placeholder="예: 20페이지 이상" maxlength="30" autocomplete="off"/>
    <label class="field-label">시간 / 알림</label>
    <input id="hab-time" type="text" placeholder="예: 30분, 23:00" maxlength="20" autocomplete="off"/>
    <div class="modal-actions">
      <button class="modal-btn-del" id="btn-del-habit" style="display:none">삭제</button>
      <button class="modal-btn-save" id="btn-save-habit">저장</button>
    </div>
  </div>
</div>

<!-- Menu Drawer -->
<div id="modal-menu" class="modal-overlay" role="dialog" aria-modal="true" aria-label="메뉴">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="menu-user" id="menu-user">
      <div class="menu-avatar" id="menu-avatar">?</div>
      <div>
        <div class="menu-name" id="menu-name">비로그인</div>
        <div class="menu-email" id="menu-email">로컬 저장 중</div>
      </div>
    </div>
    <div class="menu-list">
      <button class="menu-item" id="btn-export"><span>📤</span>데이터 내보내기 (JSON)</button>
      <button class="menu-item" id="btn-import"><span>📥</span>데이터 가져오기</button>
      <button class="menu-item" id="btn-share"><span>🔗</span>앱 공유하기</button>
      <button class="menu-item danger" id="btn-reset"><span>🗑️</span>데이터 초기화</button>
      <button class="menu-item" id="btn-logout" style="display:none"><span>👋</span>로그아웃</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="modal-confirm" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sheet confirm-sheet">
    <div class="confirm-title" id="confirm-title">정말 초기화할까요?</div>
    <div class="confirm-msg" id="confirm-msg">모든 습관 데이터가 삭제됩니다. 되돌릴 수 없어요.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirm-cancel">취소</button>
      <button class="confirm-ok danger" id="confirm-ok">삭제</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
